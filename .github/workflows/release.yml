name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - name: Verify tag matches Cargo.toml
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(awk -F'"' '/^version = / {print $2}' Cargo.toml | head -n1)
          [[ "$VERSION" == "$TOML_VERSION" ]]
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        run: gh release create "${GITHUB_REF_NAME}" --draft --verify-tag --title "${GITHUB_REF_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y cmake zlib1g-dev clang
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            if ! command -v cmake &>/dev/null; then
              brew install cmake
            fi
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            VCPKG_ROOT="${VCPKG_INSTALLATION_ROOT:-C:\\vcpkg}"
            export VCPKG_ROOT
            echo "VCPKG_ROOT=$VCPKG_ROOT" >> "$GITHUB_ENV"
            echo "RUSTFLAGS=-C target-feature=+crt-static" >> "$GITHUB_ENV"
            echo "CMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" >> "$GITHUB_ENV"
            echo "VCPKG_TARGET_TRIPLET=x64-windows-static" >> "$GITHUB_ENV"
            echo "ZLIB_ROOT=$VCPKG_ROOT/installed/x64-windows-static" >> "$GITHUB_ENV"
            "$VCPKG_ROOT/vcpkg" install cmake zlib:x64-windows-static
          fi

      - name: Build
        run: cargo build --release -p tag-cli --target ${{ matrix.target }}

      - name: Generate completions and man page
        shell: bash
        run: |
          mkdir -p dist/completions dist/man
          BIN="target/${{ matrix.target }}/release/tag-cli"
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            BIN="${BIN}.exe"
          fi
          "$BIN" completions bash > dist/completions/tag-cli.bash
          "$BIN" completions fish > dist/completions/tag-cli.fish
          "$BIN" completions zsh > dist/completions/_tag-cli
          "$BIN" completions powershell > dist/completions/_tag-cli.ps1
          "$BIN" man > dist/man/tag-cli.1

      - name: Package
        shell: bash
        run: bash scripts/package.sh "${{ needs.create-release.outputs.version }}" "${{ matrix.target }}"

      - name: Upload release assets
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" dist/tag-cli-*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checksums:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        run: |
          mkdir -p assets
          gh release download "${GITHUB_REF_NAME}" --dir assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256SUMS
        run: |
          cd assets
          sha256sum tag-cli-*.tar.gz tag-cli-*.zip > ../SHA256SUMS

      - name: Upload SHA256SUMS
        run: gh release upload "${GITHUB_REF_NAME}" SHA256SUMS --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [build, checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cargo-publish:
    needs: publish-release
    runs-on: ubuntu-latest
    if: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo publish tag-cli
        run: cargo publish -p tag-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
